name: bachelors_kitchen
description: "Bachelor's Kitchen — easy, low-budget recipes for Bangladeshi students."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^5.2.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
  fonts:
    - family: NotoBengali
      fonts:
        - asset: assets/fonts/Kalpurush.ttf
          weight: 400
        - asset: assets/fonts/Kalpurush.ttf
          weight: 700